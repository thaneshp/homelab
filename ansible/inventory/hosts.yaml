all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_python_interpreter: /usr/bin/python3

  children:
    k8s_control_plane:
      hosts:
        master-node:
          ansible_host: 192.168.4.87

    k8s_workers:
      hosts:
        worker-node-1:
          ansible_host: 192.168.4.83
        worker-node-2:
          ansible_host: 192.168.4.84