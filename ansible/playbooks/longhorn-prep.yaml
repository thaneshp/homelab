---
- name: Prepare Kubernetes nodes for Longhorn
  hosts: k8s_cluster
  become: true

  vars:
    longhorn_packages:
      - nfs-common
      - open-iscsi
    longhorn_services:
      - iscsid

  tasks:
    - name: Update apt cache and install Longhorn prerequisites
      ansible.builtin.apt:
        name: "{{ longhorn_packages }}"
        state: present
        update_cache: true

    - name: Enable and start Longhorn required services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop: "{{ longhorn_services }}"